name: 每日价格检查

on:
  schedule:
    - cron: '0 0,6 * * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 恢复价格快照
        uses: actions/cache/restore@v4
        with:
          path: data/price_snapshot.json
          key: price-snapshot-${{ github.run_id }}
          restore-keys: price-snapshot-

      - name: 运行价格检查
        run: python3 scripts/price_check.py

      - name: 保存价格快照
        uses: actions/cache/save@v4
        with:
          path: data/price_snapshot.json
          key: price-snapshot-${{ github.run_id }}
