name: 极地船票自动更新

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 恢复价格快照
        uses: actions/cache/restore@v4
        with:
          path: data/price_snapshot.json
          key: price-snapshot-${{ github.run_id }}
          restore-keys: price-snapshot-

      - name: 价格检查
        run: python3 scripts/price_check.py

      - name: 保存价格快照
        uses: actions/cache/save@v4
        with:
          path: data/price_snapshot.json
          key: price-snapshot-${{ github.run_id }}

      - name: 新闻抓取
        run: python3 scripts/news_fetcher.py

      - name: 提交更新
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/site_data.json data/.news_cache.json data/price_snapshot.json data/price_drops.json 2>/dev/null || true
          if git diff --cached --quiet 2>/dev/null; then
            echo "✅ 无变更"
          else
            git commit -m "🤖 自动更新 $(date +%m-%d)"
            git push origin main || echo "⚠️ 推送失败，跳过"
          fi
