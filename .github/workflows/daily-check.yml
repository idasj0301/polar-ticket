name: 每日价格检查

on:
  schedule:
    - cron: '0 0,6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 运行价格检查
        run: python3 scripts/price_check.py

      - name: 提交数据更新
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/site_data.json
          git add data/price_snapshot.json
          git add data/price_drops.json
          if git diff --cached --quiet; then
            echo "无变更"
          else
            git commit -m "📊 每日自动更新"
            git push
            echo "已推送"
          fi
