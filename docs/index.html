<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>极地船票管理系统</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<style>
:root{--bg:#0f1923;--card:#1a2736;--card-hover:#1e3044;--border:#2a3f55;--text:#e2e8f0;--text2:#8899aa;--accent:#4fc3f7;--green:#81c784;--warn:#ffb74d;--red:#ef5350}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.app{max-width:1240px;margin:0 auto;padding:24px 20px}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:16px 24px;background:var(--card);border-radius:14px;margin-bottom:20px;border:1px solid var(--border)}
.topbar h1{font-size:21px;font-weight:700}
.topbar .sub{font-size:12px;color:var(--text2)}
.topbar .badge{font-size:11px;color:var(--green);background:rgba(129,199,132,.12);padding:4px 12px;border-radius:20px}
.nav{display:flex;gap:4px;margin-bottom:20px;background:var(--card);border-radius:12px;padding:4px;border:1px solid var(--border)}
.nav button{flex:1;padding:10px 16px;border-radius:10px;border:none;background:none;color:var(--text2);font-size:14px;font-family:inherit;cursor:pointer;transition:.15s}
.nav button:hover{color:var(--text)}
.nav button.on{background:var(--accent);color:#0f1923;font-weight:700}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.stat{background:var(--card);border-radius:12px;padding:18px 20px;border:1px solid var(--border)}
.stat .n{font-size:30px;font-weight:700;margin-bottom:2px}
.stat .l{font-size:12px;color:var(--text2)}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:14px}
.card-row{background:var(--card);border-radius:14px;border:1px solid var(--border);overflow:hidden;cursor:pointer;transition:.15s}
.card-row:hover{border-color:var(--accent);transform:translateY(-2px)}
.card-row .hd{padding:16px;display:flex;justify-content:space-between;align-items:flex-start;border-bottom:1px solid rgba(42,63,85,.4)}
.card-row .hd .cn{font-size:16px;font-weight:700}
.card-row .hd .en{font-size:12px;color:var(--text2)}
.tag{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:600}
.tag-both{background:rgba(129,199,132,.12);color:var(--green)}
.tag-ant{background:rgba(79,195,247,.12);color:var(--accent)}
.tag-arc{background:rgba(129,212,250,.12);color:#81d4fa}
.card-row .bd{padding:16px}
.row{display:flex;justify-content:space-between;padding:5px 0;font-size:13px}
.row .l{color:var(--text2)}.row .v{font-weight:500}
.ships{margin-top:8px;display:flex;gap:4px;flex-wrap:wrap}
.ships span{font-size:10px;padding:2px 8px;border-radius:4px;background:rgba(79,195,247,.08);color:var(--accent)}
.card-row .ft{padding:10px 16px;background:rgba(0,0,0,.2);display:flex;gap:6px}
.badge-sm{font-size:10px;padding:2px 8px;border-radius:12px;display:inline-flex;align-items:center;gap:3px}
.badge-promo{background:rgba(255,183,77,.12);color:var(--warn)}
.badge-drop{background:rgba(129,199,132,.12);color:var(--green)}
.compare{width:100%;border-collapse:collapse;margin-top:16px}
.compare th{text-align:left;padding:12px 16px;font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border);font-weight:600}
.compare td{padding:14px 16px;font-size:14px;border-bottom:1px solid rgba(42,63,85,.3);vertical-align:middle}
.compare tr:hover td{background:var(--card-hover)}
.price{font-weight:700;font-size:16px;white-space:nowrap}
.price .old{font-size:11px;color:var(--text2);text-decoration:line-through;margin-left:6px;font-weight:400}
.price .off{font-size:10px;color:var(--green);margin-left:4px}
.best{display:inline-block;padding:2px 6px;border-radius:4px;font-size:10px;font-weight:700;background:rgba(129,199,132,.15);color:var(--green);margin-left:4px}
.avail{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600}
.avail.low{background:rgba(255,183,77,.1);color:var(--warn)}
.avail.ok{background:rgba(129,199,132,.1);color:var(--green)}
.news-card{background:var(--card);border-radius:14px;padding:20px;border:1px solid var(--border);margin-bottom:10px;display:flex;gap:16px;transition:.15s}
.news-card:hover{background:var(--card-hover)}
.news-card .ico{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:13px;flex-shrink:0;overflow:hidden}
.news-card .ico img{width:100%;height:100%;object-fit:contain}
.company-logo{width:24px;height:24px;border-radius:6px;display:inline-flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:11px;flex-shrink:0;overflow:hidden;vertical-align:middle;margin-right:8px}
.company-logo img{width:100%;height:100%;object-fit:contain}
img.logo-fail{display:none!important}
img.logo-fail + .logo-fallback{display:flex!important}
.news-card .bd{flex:1}.news-card .bd h4{font-size:14px;font-weight:600;margin-bottom:4px}
.news-card .bd p{font-size:12px;color:var(--text2);line-height:1.5}
.news-card .bd .meta{font-size:10px;color:var(--text2);margin-top:6px}
.imp{font-size:10px;padding:1px 6px;border-radius:8px;font-weight:600}
.imp-high{background:rgba(239,83,80,.12);color:var(--red)}
.imp-med{background:rgba(255,183,77,.12);color:var(--warn)}
.filter-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.filter-row button{padding:6px 14px;border-radius:14px;font-size:11px;cursor:pointer;border:1px solid var(--border);background:none;color:var(--text2);font-family:inherit;transition:.15s}
.filter-row button:hover{border-color:var(--accent);color:var(--accent)}
.filter-row button.on{background:var(--accent);color:#0f1923;border-color:var(--accent)}
.alert-row{background:var(--card);border-radius:14px;padding:18px 20px;border:1px solid var(--border);margin-bottom:10px;display:flex;align-items:center;gap:16px}
.alert-row .icon{font-size:22px}.alert-row .bd{flex:1}
.alert-row .bd .t{font-weight:600;font-size:14px}.alert-row .bd .d{font-size:12px;color:var(--text2)}
.alert-row .price-col{text-align:right}.alert-row .price-col .new{font-size:20px;font-weight:700;color:var(--green)}
.alert-row .price-col .old{font-size:12px;color:var(--text2);text-decoration:line-through}
.alert-row .price-col .pct{font-size:11px;color:var(--green);font-weight:600}
.empty{text-align:center;padding:60px 20px;color:var(--text2)}
.empty .big{font-size:40px;margin-bottom:10px}
.loading{text-align:center;padding:80px 20px}
.spin{display:inline-block;width:32px;height:32px;border:3px solid rgba(79,195,247,.2);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.6);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:var(--card);border-radius:20px;border:1px solid var(--border);max-width:640px;width:100%;max-height:85vh;overflow-y:auto;padding:28px}
.modal h2{font-size:20px;margin-bottom:4px;display:flex;align-items:center;gap:12px}
.modal .close{width:32px;height:32px;border-radius:50%;border:1px solid var(--border);background:none;color:var(--text);cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.modal .close:hover{background:var(--red);border-color:var(--red)}
.modal .sec{margin-top:20px}
.modal .sec h4{font-size:12px;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;font-weight:600}
.ship-card{background:rgba(255,255,255,.03);border-radius:12px;padding:14px 16px;margin-bottom:8px;border:1px solid rgba(255,255,255,.06)}
.ship-card .top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.ship-card .top .name{font-weight:600;font-size:14px}
.route-chips{display:flex;gap:6px;flex-wrap:wrap}
.route-chip{font-size:10px;padding:3px 10px;border-radius:12px;font-weight:600}
.route-chip.ant{background:rgba(79,195,247,.1);color:var(--accent)}
.route-chip.arc{background:rgba(129,212,250,.1);color:#81d4fa}
.promo-inline{font-size:12px;padding:8px 12px;border-radius:8px;background:rgba(255,183,77,.08);margin-bottom:6px;border-left:3px solid var(--warn)}
@media(max-width:768px){.stats{grid-template-columns:repeat(2,1fr)}.cards{grid-template-columns:1fr}.compare{display:block;overflow-x:auto}.modal{margin:10px;max-height:90vh}}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const {useState,useEffect} = React;

function fmt(n){return '$'+n.toLocaleString()}
function getCo(id,cos){return cos.find(c=>c.id===id)||{}}
function Logo({co,size}){
  const s = size||24;
  const src = './assets/logos/'+(co.id||'')+'.svg';
  const fallback = (co.cn||co.id||'?').charAt(0);
  const bg = co.color||'var(--accent)';
  return React.createElement('div',{className:s>30?'ico':'company-logo',style:{width:s,height:s,background:bg,fontSize:s>30?13:11,overflow:'hidden'}},
    React.createElement('img',{src:src,alt:co.cn||co.id,style:{width:'100%',height:'100%',objectFit:'contain'},
      onError:function(e){e.target.classList.add('logo-fail');}
    }),
    React.createElement('span',{className:'logo-fallback',style:{display:'none',alignItems:'center',justifyContent:'center',width:'100%',height:'100%'}},fallback)
  );
}

function App(){
  const [data,setData] = useState(null);
  const [cos,setCos] = useState([]);
  const [tab,setTab] = useState('compare');
  const [detailCo,setDetailCo] = useState(null);
  const [loading,setLoading] = useState(true);

  useEffect(()=>{
    Promise.all([
      fetch('./data/site_data.json').then(r=>r.json()),
      fetch('./data/companies.json').then(r=>r.json())
    ]).then(([d,c])=>{
      setData(d); setCos(c); setLoading(false);
    }).catch(()=>{
      setLoading(false);
    });
  },[]);

  if(loading) return <div className="app"><div className="loading"><div className="spin"></div><div style={{color:'var(--text2)',marginTop:16}}>加载数据中...</div></div></div>;
  if(!data) return <div className="app"><div className="empty"><div className="big">⚠️</div><p>数据加载失败，请刷新重试</p></div></div>;

  const V = data.voyages||[]; const P = data.promotions||[]; const N = data.news||[];
  const stats = {total:cos.length,ant:cos.filter(c=>c.r.includes('antarctic')).length,arc:cos.filter(c=>c.r.includes('arctic')).length,promo:cos.filter(c=>c.promos>0).length,drops:cos.filter(c=>c.drops>0).length,updated:data.updated||''};

  return (
    <div className="app">
      <div className="topbar">
        <div><h1>❄️ 极地船票</h1><div className="sub">24家极地邮轮公司 · 实时比价 · 情报监控 · {stats.updated?(()=>{const dt=new Date(stats.updated);const ms=Date.now()-dt.getTime();const min=Math.floor(ms/60000);if(min<1)return'刚刚更新';if(min<60)return min+'分钟前更新';const hr=Math.floor(min/60);if(hr<24)return hr+'小时前更新';return Math.floor(hr/24)+'天前更新';})():''}</div></div>
        <div className="badge">● 数据就绪</div>
      </div>
      <div className="nav">
        <button className={tab==='compare'?'on':''} onClick={()=>setTab('compare')}>📊 比价</button>
        <button className={tab==='companies'?'on':''} onClick={()=>setTab('companies')}>🏢 公司 ({stats.total})</button>
        <button className={tab==='alerts'?'on':''} onClick={()=>setTab('alerts')}>🔔 降价 ({stats.drops})</button>
        <button className={tab==='news'?'on':''} onClick={()=>setTab('news')}>📰 情报站</button>
        <button className={tab==='cabin'?'on':''} onClick={()=>setTab('cabin')}>🚢 舱位</button>
        <button className={tab==='query'?'on':''} onClick={()=>setTab('query')}>💬 智能查询</button>
      </div>
      <div className="stats">
        <div className="stat"><div className="n" style={{color:'var(--accent)'}}>{stats.total}</div><div className="l">监控公司</div></div>
        <div className="stat"><div className="n" style={{color:'var(--accent)'}}>{stats.ant}</div><div className="l">南极有船</div></div>
        <div className="stat"><div className="n" style={{color:'var(--warn)'}}>{stats.promo}</div><div className="l">活跃促销</div></div>
        <div className="stat"><div className="n" style={{color:'var(--green)'}}>{stats.drops}</div><div className="l">今日降价</div></div>
      </div>
      {tab==='compare' && <CompareView V={V} cos={cos}/>}
      {tab==='companies' && <CompaniesView cos={cos} P={P} onDetail={setDetailCo}/>}
      {tab==='alerts' && <AlertsView V={V} P={P} cos={cos}/>}
      {tab==='news' && <NewsView N={N} cos={cos}/>}
      {tab==='cabin' && <CabinView V={V} cos={cos}/>}
      {tab==='query' && <QueryView V={V} P={P} N={N} cos={cos}/>}
      {detailCo && <CompanyDetail co={detailCo} V={V} P={P} cos={cos} onClose={()=>setDetailCo(null)}/>}
    </div>
  );
}

function CompareView({V,cos}){
  const group = V.filter(v=>v.r==='antarctic'&&v.days>=6&&v.days<=14);
  const cheapest = group.length?Math.min(...group.map(v=>v.cabins[0].price)):0;
  return (
    <div>
      <div style={{fontSize:18,fontWeight:700,marginBottom:16}}>📊 南极航线比价</div>
      <div style={{overflowX:'auto'}}>
      <table className="compare">
        <thead><tr><th>公司</th><th>船只</th><th>航线</th><th>日期</th><th>天数</th><th>最低舱位</th><th>价格</th><th>每日均价</th><th>折扣</th><th>库存</th></tr></thead>
        <tbody>
        {group.sort((a,b)=>a.cabins[0].price-b.cabins[0].price).map(v=>{
          const co=getCo(v.co,cos); const c=v.cabins[0]; const pd=Math.round(c.price/v.days);
          const disc=c.orig?Math.round((1-c.price/c.orig)*100):0; const isBest=c.price===cheapest;
          return <tr key={v.id}>
            <td><div style={{display:'flex',alignItems:'center'}}><Logo co={co} size={22}/><div><b>{co.cn||v.co}</b><div style={{fontSize:11,color:'var(--text2)'}}>{co.pos||''}</div></div></div></td>
            <td>{v.ship}</td><td style={{maxWidth:200,fontSize:13}}>{v.name}</td><td style={{whiteSpace:'nowrap'}}>{v.date}</td><td>{v.days}天</td>
            <td>{c.cat}</td>
            <td className="price">{fmt(c.price)}{isBest&&<span className="best">最低</span>}{c.orig>c.price&&<span className="old">{fmt(c.orig)}</span>}{disc>0&&<span className="off">-{disc}%</span>}</td>
            <td>{fmt(pd)}/天</td>
            <td>{disc>0?<span style={{color:'var(--green)',fontWeight:600}}>-{disc}%</span>:'—'}</td>
            <td><span className={'avail '+(c.avail<=2?'low':'ok')}>{c.avail<=2?'仅剩'+c.avail:c.avail+'间'}</span></td>
          </tr>
        })}
        </tbody>
      </table></div>
    </div>
  );
}

function CompaniesView({cos,P,onDetail}){
  const [q,setQ] = useState('');
  const filtered = q?cos.filter(c=>(c.cn||'').includes(q)||(c.en||'').toLowerCase().includes(q.toLowerCase())||(c.pos||'').includes(q)):cos;
  return (
    <div>
      <input placeholder="🔍 搜索公司..." value={q} onChange={e=>setQ(e.target.value)} style={{width:'100%',padding:'12px 16px',borderRadius:12,border:'1px solid var(--border)',background:'var(--card)',color:'var(--text)',fontSize:14,outline:'none',marginBottom:16,fontFamily:'inherit'}}/>
      <div className="cards">
      {filtered.map(c=>{
        const rl=(c.r||[]).length>1?'南北极':(c.r||[])[0]==='antarctic'?'南极':'北极';
        const rc=(c.r||[]).length>1?'tag-both':(c.r||[])[0]==='antarctic'?'tag-ant':'tag-arc';
        const ps=P.filter(p=>p.co===c.id);
        return <div className="card-row" key={c.id} onClick={()=>onDetail&&onDetail(c)}>
          <div className="hd"><div style={{display:'flex',alignItems:'flex-start',gap:10}}><Logo co={c} size={32}/><div><div className="cn">{c.cn} <span className={'tag '+rc}>{rl}</span></div><div className="en">{c.en} · {c.pos}</div></div></div></div>
          <div className="bd">
            <div className="row"><span className="l">船只</span><span className="v">{c.sn}艘</span></div>
            <div className="ships">{(c.ships||[]).slice(0,3).map(s=><span key={s}>{s}</span>)}{c.sn>3&&<span>+{c.sn-3}</span>}</div>
            <div style={{marginTop:8,display:'flex',gap:4,flexWrap:'wrap'}}>{(c.feat||[]).map(f=><span key={f} style={{fontSize:10,padding:'1px 6px',borderRadius:4,background:'rgba(79,195,247,.05)',color:'var(--text2)'}}>{f}</span>)}</div>
            <div style={{marginTop:8,display:'flex',gap:6}}>
              {ps.length>0&&<span className="badge-sm badge-promo">🔥 {ps.length}条促销</span>}
              {c.drops>0&&<span className="badge-sm badge-drop">📉 {c.drops}航次降价</span>}
            </div>
          </div>
        </div>
      })}
      </div>
    </div>
  );
}

function AlertsView({V,P,cos}){
  const drops=[];
  V.forEach(v=>{v.cabins.forEach(c=>{if(c.orig&&c.price<c.orig){const co=getCo(v.co,cos);drops.push({co,v,c,pct:Math.round((1-c.price/c.orig)*100)});}})});
  drops.sort((a,b)=>b.pct-a.pct);
  return (
    <div>
      <div style={{fontSize:18,fontWeight:700,marginBottom:16}}>🔔 降价提醒 <span style={{fontSize:13,color:'var(--text2)',fontWeight:400}}>{drops.length}条</span></div>
      {drops.map((d,i)=><div className="alert-row" key={i}>
        <div className="icon">📉</div>
        <div className="bd"><div className="t">{(d.co.cn||d.v.co)} · {d.v.name}</div><div className="d">{d.c.cat} · {d.v.ship} · {d.v.date} · {d.v.days}天</div></div>
        <div className="price-col"><div className="new">{fmt(d.c.price)}</div><div className="old">{fmt(d.c.orig)}</div><div className="pct">-{d.pct}%</div></div>
      </div>)}
      <div style={{marginTop:28,fontSize:18,fontWeight:700,marginBottom:16}}>🔥 活跃促销</div>
      {P.map((p,i)=>{const co=getCo(p.co,cos);return <div className="alert-row" key={'p'+i} style={{borderLeft:'3px solid var(--warn)'}}>
        <div className="icon">🔥</div><div className="bd"><div className="t">{(co.cn||p.co)} · {p.t}</div><div className="d">{p.d} | 截止: {p.exp}</div></div>
        <div style={{fontWeight:700,color:'var(--warn)',fontSize:15}}>{p.v}</div>
      </div>})}
    </div>
  );
}

function NewsView({N,cos}){
  const [cat,setCat] = useState('all');
  const cats={}; N.forEach(n=>{cats[n.cat]=(cats[n.cat]||0)+1});
  const filtered=cat==='all'?N:N.filter(n=>n.cat===cat);
  return (
    <div>
      <div style={{fontSize:18,fontWeight:700,marginBottom:6}}>📰 南极情报站</div>
      <div style={{fontSize:12,color:'var(--text2)',marginBottom:14}}>21家极地邮轮公司最新动态 · 新媒体内容素材库 · 共{N.length}条情报</div>
      <div className="filter-row">
        <button className={cat==='all'?'on':''} onClick={()=>setCat('all')}>全部({N.length})</button>
        {Object.keys(cats).sort().map(c=><button key={c} className={cat===c?'on':''} onClick={()=>setCat(c)}>{c}({cats[c]})</button>)}
      </div>
      {filtered.map(n=>{const co=getCo(n.co,cos);return <div className="news-card" key={n.d+n.co+n.title} style={{cursor:n.url?'pointer':'default'}} onClick={()=>{if(n.url)window.open(n.url,'_blank')}}>
        <Logo co={co} size={36}/>
        <div className="bd"><h4>{n.title} <span className={'imp imp-'+(n.imp==='high'?'high':'med')}>{n.imp==='high'?'重磅':'关注'}</span></h4><p>{n.desc}</p><div className="meta">{co.cn||n.co} · {n.d} · {n.src} · {n.cat}</div></div>
      </div>})}
    </div>
  );
}

function CabinView({V,cos}){
  const [filter,setFilter] = useState('all');
  const allCabins = [];
  V.forEach(v=>{
    const co=getCo(v.co,cos);
    v.cabins.forEach(c=>{
      allCabins.push({...c,voyage:v,co:co});
    });
  });
  const stats = {total:allCabins.length,sold:allCabins.filter(c=>c.avail===0).length,low:allCabins.filter(c=>c.avail>0&&c.avail<=2).length,ok:allCabins.filter(c=>c.avail>2).length};
  const filtered = filter==='sold'?allCabins.filter(c=>c.avail===0):filter==='low'?allCabins.filter(c=>c.avail>0&&c.avail<=2):allCabins;
  return (
    <div>
      <div style={{fontSize:18,fontWeight:700,marginBottom:6}}>🚢 舱位库存监控</div>
      <div style={{fontSize:12,color:'var(--text2)',marginBottom:14}}>共 {stats.total} 个舱位类型 · 售罄 {stats.sold} · 紧张 {stats.low} · 充足 {stats.ok}</div>
      <div className="filter-row">
        <button className={filter==='all'?'on':''} onClick={()=>setFilter('all')}>全部 ({stats.total})</button>
        <button className={filter==='sold'?'on':''} onClick={()=>setFilter('sold')} style={filter==='sold'?{}:{color:'var(--red)',borderColor:'rgba(239,83,80,.3)'}}>🔴 售罄 ({stats.sold})</button>
        <button className={filter==='low'?'on':''} onClick={()=>setFilter('low')} style={filter==='low'?{}:{color:'var(--warn)',borderColor:'rgba(255,183,77,.3)'}}>🟡 紧张 ({stats.low})</button>
      </div>
      <div style={{overflowX:'auto'}}>
      <table className="compare">
        <thead><tr><th>公司</th><th>航次</th><th>船只</th><th>舱位</th><th>价格</th><th>原价</th><th>折扣</th><th>库存</th></tr></thead>
        <tbody>
        {filtered.map((c,i)=>{
          const disc=c.orig>c.price?Math.round((1-c.price/c.orig)*100):0;
          const status=c.avail===0?'sold':c.avail<=2?'low':'ok';
          const statusLabel=c.avail===0?'售罄':c.avail<=2?'仅剩'+c.avail:'余'+c.avail;
          return <tr key={i} style={c.avail===0?{opacity:.5}:{}}>
            <td><div style={{display:'flex',alignItems:'center'}}><Logo co={c.co} size={18}/><span style={{marginLeft:6,fontWeight:600,fontSize:13}}>{c.co.cn||c.voyage.co}</span></div></td>
            <td style={{fontSize:12,maxWidth:160}}>{c.voyage.name}</td>
            <td style={{fontSize:11}}>{c.voyage.ship}</td>
            <td style={{fontWeight:500}}>{c.cat}</td>
            <td style={{fontWeight:700,color:'var(--accent)',whiteSpace:'nowrap'}}>{fmt(c.price)}</td>
            <td style={{fontSize:12,color:'var(--text2)',textDecoration:c.orig>c.price?'line-through':'none',whiteSpace:'nowrap'}}>{c.orig>c.price?fmt(c.orig):'—'}</td>
            <td>{disc>0?<span style={{color:'var(--green)',fontWeight:600}}>-{disc}%</span>:'—'}</td>
            <td><span className={'avail '+(status==='sold'?'low':status==='low'?'low':'ok')} style={status==='sold'?{background:'rgba(239,83,80,.12)',color:'var(--red)'}:status==='low'?{background:'rgba(255,183,77,.1)',color:'var(--warn)'}:{}}>{statusLabel}</span></td>
          </tr>
        })}
        </tbody>
      </table></div>
    </div>
  );
}

function QueryView({V,P,N,cos}){
  const [q,setQ] = useState('12月南极 优惠最大');
  const [results,setResults] = useState(null);
  const parseIntent = (text) => {
    const t = text.toLowerCase();
    const intent = {region:null,months:[],budget:null,identity:[],prefs:[],cheapest:false,compare:false,news:false};
    // 区域
    if(/南极|企鹅|南极光/.test(t)) intent.region='antarctic';
    else if(/北极|北极熊|斯瓦尔巴|格陵兰|朗伊尔/.test(t)) intent.region='arctic';
    // 月份
    const monMap={1:'01',2:'02',3:'03',4:'04',5:'05',6:'06',7:'07',8:'08',9:'09',10:'10',11:'11',12:'12'};
    const m = t.match(/(\d{1,2})\s*月/); if(m) intent.months.push(monMap[parseInt(m[1])]||m[1]);
    if(/春节/.test(t)){intent.months.push('01');intent.year='2027';}
    if(/元旦|圣诞|跨年/.test(t)) intent.months.push('12');
    if(/暑假/.test(t)){intent.months.push('07','08');}
    if(/寒假/.test(t)){intent.months.push('01','02');}
    // 预算
    const b = t.match(/(\d+)\s*万/); if(b){const rmb=parseInt(b[1])*10000;intent.budget=rmb;}
    if(/\$(\d+)/.test(t)||/(\d+)\s*美元/.test(t)){const m2=t.match(/\$?\s*(\d[\d,]*)\s*(美元|usd)/i)||t.match(/\$(\d[\d,]*)/);if(m2)intent.budget=parseInt(m2[1].replace(/,/g,''))||intent.budget;}
    // 身份/偏好
    if(/夫妻|情侣|蜜月|二人/.test(t)) intent.identity.push('couple');
    if(/带爸妈|带父母|老人|长辈/.test(t)) intent.identity.push('elderly');
    if(/单人|一个人|独行/.test(t)) intent.identity.push('solo');
    if(/带小孩|亲子/.test(t)) intent.identity.push('family');
    if(/中文/.test(t)) intent.prefs.push('chinese');
    if(/豪华|奢华|最好的|顶级/.test(t)) intent.prefs.push('luxury');
    if(/省钱|便宜|性价比|经济/.test(t)) intent.prefs.push('budget');
    if(/飞南极|不晕船|飞越德雷克/.test(t)) intent.prefs.push('fly');
    if(/折扣最大|优惠最多|促销最大/.test(t)) intent.prefs.push('maxdiscount');
    if(/对比|比较|哪个好/.test(t)) intent.compare=true;
    if(/情报|新闻|动态/.test(t)) intent.news=true;
    if(/探险|刺激|户外/.test(t)) intent.prefs.push('adventure');
    if(/摄影|拍照/.test(t)) intent.prefs.push('photo');
    if(/新船|最新的船/.test(t)) intent.prefs.push('newship');
    if(/不限预算|不管价格|都行/.test(t)) intent.budget=null;
    return intent;
  };
  const doQuery = (text) => {
    const query = text || q;
    if(!query.trim()) return;
    if(text) setQ(text);
    const intent = parseIntent(query);
    let voyages = [...V];
    // 区域过滤
    if(intent.region) voyages = voyages.filter(v=>v.r===intent.region);
    // 月份过滤
    if(intent.months.length) voyages = voyages.filter(v=>intent.months.some(m=>v.date.includes('-'+m+'-')));
    // 预算过滤 (找最低舱位价)
    if(intent.budget) voyages = voyages.filter(v=>v.cabins[0].price <= intent.budget);
    // 偏好: max discount
    if(intent.prefs.includes('maxdiscount')) voyages.sort((a,b)=>{const da=a.cabins[0].orig?a.cabins[0].orig-a.cabins[0].price:0;const db=b.cabins[0].orig?b.cabins[0].orig-b.cabins[0].price:0;return db-da;});
    // 偏好: fly
    else if(intent.prefs.includes('fly')) voyages = voyages.filter(v=>v.name.toLowerCase().includes('fly')||(getCo(v.co,cos).feat||[]).some(f=>f.includes('飞')));
    // 偏好: chinese
    else if(intent.prefs.includes('chinese')) voyages = voyages.filter(v=>(getCo(v.co,cos).feat||[]).some(f=>f.includes('中文'))||v.co==='66expeditions');
    // 偏好: budget
    else if(intent.prefs.includes('budget')) voyages.sort((a,b)=>a.cabins[0].price-b.cabins[0].price);
    // 偏好: luxury
    else if(intent.prefs.includes('luxury')) voyages = voyages.filter(v=>{const co=getCo(v.co,cos);return co.pos&&(co.pos.includes('奢华')||co.pos.includes('超奢'));});
    // 默认按价格排序
    else voyages.sort((a,b)=>a.cabins[0].price-b.cabins[0].price);
    // 夫妻/情侣: 过滤三人舱
    if(intent.identity.includes('couple')) voyages = voyages.map(v=>({...v,cabins:v.cabins.filter(c=>!c.cat.includes('Triple')&&!c.cat.includes('三人'))})).filter(v=>v.cabins.length>0);
    // 带爸妈: 过滤旧船
    if(intent.identity.includes('elderly')) voyages = voyages.filter(v=>v.days<=15);
    setResults({intent,voyages:voyages.slice(0,10)});
  };
  useEffect(()=>{doQuery();},[]);
  const chips = ['12月南极 优惠最大','南极 夫妻 蜜月 豪华','南极 10万以内 中文','飞南极 不晕船','北极 暑假 性价比','带爸妈 南极 不折腾','春节 南极 折扣最大','圣诞 南极 情侣'];
  return (
    <div>
      <div style={{fontSize:18,fontWeight:700,marginBottom:4}}>💬 智能查询</div>
      <div style={{fontSize:12,color:'var(--text2)',marginBottom:14}}>输入自然语言查询，例如「12月南极 蜜月 10万以内 中文」</div>
      <div style={{display:'flex',gap:8,marginBottom:12}}>
        <input value={q} onChange={e=>setQ(e.target.value)} onKeyDown={e=>e.key==='Enter'&&doQuery()} placeholder="输入查询... 如：12月南极 夫妻 性价比" style={{flex:1,padding:'12px 16px',borderRadius:12,border:'1px solid var(--border)',background:'var(--card)',color:'var(--text)',fontSize:15,outline:'none',fontFamily:'inherit'}}/>
        <button onClick={doQuery} style={{padding:'12px 24px',borderRadius:12,background:'var(--accent)',color:'#0f1923',border:'none',fontWeight:700,fontSize:15,cursor:'pointer',fontFamily:'inherit'}}>🔍 查询</button>
      </div>
      <div className="filter-row" style={{marginBottom:16}}>{chips.map(c=><button key={c} onClick={()=>doQuery(c)}>{c}</button>)}</div>
      {results && (
        <div>
          <div style={{fontSize:13,color:'var(--text2)',marginBottom:12}}>找到 <b style={{color:'var(--accent)'}}>{results.voyages.length}</b> 个匹配航次 · 意图: {results.intent.region==='antarctic'?'🐧南极':results.intent.region==='arctic'?'🐻‍❄️北极':'全区域'}{results.intent.months.length?' · '+results.intent.months.join('/')+'月':''}{results.intent.budget?' · ¥'+results.intent.budget.toLocaleString()+'以内':''}{results.intent.prefs.length?' · '+results.intent.prefs.join('+'):''}</div>
          {results.voyages.map(v=>{
            const co=getCo(v.co,cos); const c=v.cabins[0]; const pd=Math.round(c.price/(v.days||1));
            const disc=c.orig>c.price?Math.round((1-c.price/c.orig)*100):0;
            const coPromos=P.filter(p=>p.co===v.co).slice(0,2);
            return <div key={v.id} style={{background:'var(--card)',borderRadius:14,border:'1px solid var(--border)',padding:20,marginBottom:10,display:'flex',gap:16,alignItems:'flex-start'}}>
              <Logo co={co} size={40}/>
              <div style={{flex:1}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
                  <div><div style={{fontWeight:700,fontSize:16}}>{co.cn} · {v.name}</div><div style={{fontSize:12,color:'var(--text2)',marginTop:2}}>🚢 {v.ship} · {v.date} · {v.days}天 · {v.port} · 每日均价 {fmt(pd)}</div></div>
                  <div style={{textAlign:'right'}}><div className="price">{fmt(c.price)}{disc>0&&<span className="off">-{disc}%</span>}</div>{c.orig>c.price&&<div className="old">{fmt(c.orig)}</div>}</div>
                </div>
                <div style={{marginTop:8,display:'flex',gap:12,flexWrap:'wrap'}}>
                  {v.cabins.slice(0,4).map((cb,i)=><span key={i} style={{fontSize:11,padding:'2px 8px',borderRadius:8,background:cb.avail===0?'rgba(239,83,80,.1)':cb.avail<=2?'rgba(255,183,77,.1)':'rgba(79,195,247,.06)',color:cb.avail===0?'var(--red)':cb.avail<=2?'var(--warn)':'var(--text2)'}}>{cb.cat}: {cb.avail===0?'售罄':cb.avail+'间'} {fmt(cb.price)}</span>)}</div>
                {coPromos.length>0 && <div style={{marginTop:8,display:'flex',gap:6,flexWrap:'wrap'}}>{coPromos.map(p=><span key={p.t} style={{fontSize:10,padding:'2px 8px',borderRadius:8,background:'rgba(255,183,77,.1)',color:'var(--warn)',fontWeight:600}}>🔥 {p.t}: {p.v}</span>)}</div>}
              </div>
            </div>
          })}
          {results.voyages.length===0 && <div className="empty"><div className="big">🔍</div><p>没找到匹配的航次，试试放宽条件</p><p style={{fontSize:12,color:'var(--text2)',marginTop:4}}>例如：去掉预算限制、换一个月份、或者只搜区域</p></div>}
        </div>
      )}
    </div>
  );
}

function CompanyDetail({co,V,P,cos,onClose}){
  const coVoyages = V.filter(v=>v.co===co.id);
  const coPromos = P.filter(p=>p.co===co.id);
  const rl = (co.r||[]).length>1?'南北极':(co.r||[])[0]==='antarctic'?'南极':'北极';
  const ant = coVoyages.filter(v=>v.r==='antarctic');
  const arc = coVoyages.filter(v=>v.r==='arctic');
  return (
    <div className="overlay" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:20}}>
          <h2><Logo co={co} size={40}/>{co.cn||co.id}<span style={{fontSize:14,color:'var(--text2)',fontWeight:400,marginLeft:8}}>{co.en}</span></h2>
          <button className="close" onClick={onClose}>✕</button>
        </div>
        <div style={{display:'flex',gap:20,marginBottom:20,flexWrap:'wrap'}}>
          <div><div style={{fontSize:20,fontWeight:700}}>{co.sn}</div><div style={{fontSize:11,color:'var(--text2)'}}>船只</div></div>
          <div><div style={{fontSize:20,fontWeight:700}}>{rl}</div><div style={{fontSize:11,color:'var(--text2)'}}>运营区域</div></div>
          <div><div style={{fontSize:20,fontWeight:700}}>{co.pos}</div><div style={{fontSize:11,color:'var(--text2)'}}>定位</div></div>
          <div><div style={{fontSize:20,fontWeight:700,color:'var(--warn)'}}>{coPromos.length}</div><div style={{fontSize:11,color:'var(--text2)'}}>促销</div></div>
        </div>
        <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:20}}>{(co.feat||[]).map(f=><span key={f} style={{fontSize:11,padding:'3px 10px',borderRadius:12,background:'rgba(79,195,247,.06)',color:'var(--text2)'}}>{f}</span>)}</div>
        {coPromos.length>0 && <div className="sec"><h4>🔥 当前促销 ({coPromos.length}条)</h4>{coPromos.map(p=><div className="promo-inline" key={p.t}><b>{p.t}</b> — {p.d}<span style={{color:'var(--warn)',fontWeight:600,marginLeft:8}}>{p.v}</span><span style={{marginLeft:8,fontSize:10,color:'var(--text2)'}}>截止 {p.exp}</span></div>)}</div>}
        <div className="sec"><h4>🚢 船队 ({co.sn}艘)</h4>{(co.ships||[]).map(s=><div className="ship-card" key={s}><div className="top"><span className="name">🚢 {s}</span></div></div>)}</div>
        {ant.length>0 && <div className="sec"><h4>🐧 南极航线 ({ant.length}个航次)</h4>{ant.map(v=>{const c=v.cabins[0];return <div className="ship-card" key={v.id}><div className="top"><span className="name">{v.name}</span><span style={{fontWeight:700,fontSize:14,color:'var(--accent)'}}>{fmt(c.price)}</span></div><div style={{fontSize:11,color:'var(--text2)'}}>{v.ship} · {v.date} · {v.days}天 · {v.port}</div><div style={{fontSize:11,marginTop:6}}>{v.cabins.map((c,i)=><span key={i} style={{marginRight:10,fontSize:11,color:c.avail===0?'var(--red)':c.avail<=2?'var(--warn)':'var(--text2)'}}>{c.cat}: {c.avail===0?'售罄':c.avail+'间'}{c.orig>c.price&&<span style={{color:'var(--green)',marginLeft:2}}>↓{Math.round((1-c.price/c.orig)*100)}%</span>}</span>)}</div></div>})}</div>}
        {arc.length>0 && <div className="sec"><h4>🐻‍❄️ 北极航线 ({arc.length}个航次)</h4>{arc.map(v=>{const c=v.cabins[0];return <div className="ship-card" key={v.id}><div className="top"><span className="name">{v.name}</span><span style={{fontWeight:700,fontSize:14,color:'var(--accent)'}}>{fmt(c.price)}</span></div><div style={{fontSize:11,color:'var(--text2)'}}>{v.ship} · {v.date} · {v.days}天 · {v.port}</div><div style={{fontSize:11,marginTop:6}}>{v.cabins.map((c,i)=><span key={i} style={{marginRight:10,fontSize:11,color:c.avail===0?'var(--red)':c.avail<=2?'var(--warn)':'var(--text2)'}}>{c.cat}: {c.avail===0?'售罄':c.avail+'间'}{c.orig>c.price&&<span style={{color:'var(--green)',marginLeft:2}}>↓{Math.round((1-c.price/c.orig)*100)}%</span>}</span>)}</div></div>})}</div>}
        <div className="sec" style={{textAlign:'center',paddingTop:16,borderTop:'1px solid var(--border)'}}>
          {co.domain && <a href={'https://'+co.domain} target="_blank" rel="noopener noreferrer" style={{color:'var(--accent)',textDecoration:'none',fontSize:13}}>{co.domain} →</a>}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
